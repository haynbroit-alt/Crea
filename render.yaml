services:
  - type: web
    name: ai-video-agent
    env: python
    region: frankfurt
    plan: free
    buildCommand: apt-get update -qq && apt-get install -y -qq ffmpeg fonts-dejavu-core && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips="*"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: cron
    name: world-daily-advance
    env: python
    region: frankfurt
    plan: free
    schedule: "0 18 * * *"
    buildCommand: pip install requests
    startCommand: >
      python -c "
      import os, requests, sys;
      url = os.environ.get('APP_URL','').rstrip('/') + '/world/advance?render=true';
      r = requests.post(url, timeout=30);
      print(r.status_code, r.text[:200]);
      sys.exit(0 if r.status_code < 400 else 1)
      "
    envVars:
      - key: APP_URL
        sync: false
