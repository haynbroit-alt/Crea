services:
  - type: web
    name: ai-video-agent
    env: python
    region: frankfurt
    plan: free
    buildCommand: apt-get update -qq && apt-get install -y -qq ffmpeg fonts-dejavu-core && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
